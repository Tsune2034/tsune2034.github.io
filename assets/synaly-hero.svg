<svg viewBox="0 0 480 360" xmlns="http://www.w3.org/2000/svg" font-family="Inter, 'Hiragino Sans', sans-serif">
  <defs>
    <radialGradient id="g-synergy" cx="40%" cy="50%">
      <stop offset="0%" stop-color="#00C896"/>
      <stop offset="100%" stop-color="#006B50"/>
    </radialGradient>
    <radialGradient id="g-future" cx="60%" cy="50%">
      <stop offset="0%" stop-color="#4A7FD4"/>
      <stop offset="100%" stop-color="#0B2D72"/>
    </radialGradient>
    <radialGradient id="g-synaly" cx="50%" cy="50%">
      <stop offset="0%" stop-color="#FFFFFF"/>
      <stop offset="60%" stop-color="#E8FFF8"/>
      <stop offset="100%" stop-color="#B8F0E0"/>
    </radialGradient>
    <filter id="blur-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
    <clipPath id="clip-synergy">
      <circle cx="185" cy="180" r="140"/>
    </clipPath>
    <clipPath id="clip-future">
      <circle cx="295" cy="180" r="140"/>
    </clipPath>
    <mask id="overlap-mask">
      <rect width="480" height="360" fill="white"/>
      <circle cx="185" cy="180" r="140" fill="black"/>
    </mask>
  </defs>

  <!-- Synergy circle -->
  <circle cx="185" cy="180" r="140" fill="url(#g-synergy)" opacity="0.92"/>

  <!-- Future Scenario circle -->
  <circle cx="295" cy="180" r="140" fill="url(#g-future)" opacity="0.92"/>

  <!-- Overlap glow -->
  <ellipse cx="240" cy="180" rx="44" ry="60" fill="url(#g-synaly)" filter="url(#blur-glow)" opacity="0.85"/>

  <!-- SYNERGY label -->
  <text x="155" y="162" text-anchor="middle" font-size="11" font-weight="700" letter-spacing="2" fill="rgba(255,255,255,0.9)">SYNERGY</text>
  <text x="155" y="178" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)" letter-spacing="1">相乗効果</text>

  <!-- FUTURE SCENARIO label -->
  <text x="325" y="155" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.9)">FUTURE</text>
  <text x="325" y="169" text-anchor="middle" font-size="9.5" font-weight="700" letter-spacing="1.5" fill="rgba(255,255,255,0.9)">SCENARIO</text>
  <text x="325" y="184" text-anchor="middle" font-size="9" fill="rgba(255,255,255,0.75)" letter-spacing="1">未来予想</text>

  <!-- Synaly center text -->
  <text x="240" y="174" text-anchor="middle" font-size="22" font-weight="900" fill="#006B50" letter-spacing="-0.5" opacity="0.95">Synaly</text>
  <text x="240" y="192" text-anchor="middle" font-size="8" fill="#006B50" letter-spacing="1.5" opacity="0.8">シナリー</text>

  <!-- × symbol between label areas -->
  <text x="240" y="230" text-anchor="middle" font-size="11" fill="rgba(0,107,80,0.5)" letter-spacing="2">× AI × データ連動</text>
</svg>
