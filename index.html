<!DOCTYPE html>
<html>

<head>

  <title>Tsune AI Lab</title>

  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin: 0;
      background: #f5f5f5;
    }

    .header {
      background: black;
      color: white;
      padding: 30px;
    }

    .hero img {
      width: 400px;
      border-radius: 20px;
      margin-top: 30px;
    }

    .section {
      margin-top: 40px;
    }

    button {
      font-size: 20px;
      padding: 10px 20px;
    }

    input {
      font-size: 16px;
      padding: 8px;
      width: 250px;
    }

    .links a {
      display: inline-block;
      margin: 10px;
      font-size: 18px;
      text-decoration: none;
      color: white;
      background: #333;
      padding: 10px 20px;
      border-radius: 10px;
    }
  </style>

</head>


<body>

  <div class="header">

    <h1>Tsune AI Lab</h1>

    <p>AI × 思考 × 未来</p>

  </div>


  <div class="hero">

    <img src="chanyari.jpg">

  </div>


  <div class="section">

    <h2>コンテンツ</h2>

    <div class="links">

      <a href="https://note.com/taune2034/n/nd96954dd9cbe" target="_blank">
        noteを見る
      </a>

      <a href="https://www.tiktok.com/@channel.yari" target="_blank">
        TikTokを見る
      </a>

    </div>

  </div>


  <div class="section">

    <h2>クリックカウンター</h2>

    <p id="count">クリック回数：0</p>

    <button onclick="countUp()">クリック</button>

  </div>


  <div class="section">

    <h2>AI画像生成</h2>

    <input id="prompt" placeholder="生成したい画像">

    <br><br>

    <button onclick="generateImage()">
      画像生成
    </button>

    <br><br>

    <p id="result"></p>

  </div>



  <script>

    let count = 0;

    function countUp() {

      count = count + 1;

      document.getElementById("count").innerText =
        "クリック回数：" + count;

    }



    async function generateImage() {

      const prompt =
        document.getElementById("prompt").value

      document.getElementById("result").innerText =
        "AI送信: " + prompt

    }

  </script>


</body>

</html>
