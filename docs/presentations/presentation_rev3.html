    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg:     #09090f;
      --accent: #0052ff;
      --telop:  #FFD600;
      --muted:  rgba(255,255,255,0.5);
    }

    body {
      background: var(--bg);
      color: #fff;
      font-family: -apple-system, 'Helvetica Neue', Arial, sans-serif;
      height: 100vh;
      width: 100vw;
      overflow: hidden;
      user-select: none;
    }

    /* ── Stage ── */
    #stage {
      position: relative;
      width: 100%;
      height: 100vh;
    }

    .slide {
      position: absolute;
      inset: 0;
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      padding: 80px 60px 100px;
      opacity: 0;
      pointer-events: none;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .slide.active { opacity: 1; pointer-events: all; }

    /* ── Animations ── */
    .slide[data-anim="fade"].entering  { animation: fadeIn  0.6s ease forwards; }
    .slide[data-anim="fade"].leaving   { animation: fadeOut 0.4s ease forwards; }
    .slide[data-anim="slide"].entering { animation: slideInRight 0.55s cubic-bezier(0.25,0.46,0.45,0.94) forwards; }
    .slide[data-anim="slide"].leaving  { animation: slideOutLeft  0.4s cubic-bezier(0.55,0,1,0.45) forwards; }
    .slide[data-anim="zoom"].entering  { animation: zoomIn  0.6s cubic-bezier(0.34,1.56,0.64,1) forwards; }
    .slide[data-anim="zoom"].leaving   { animation: zoomOut 0.4s ease forwards; }

    @keyframes fadeIn       { from{opacity:0}                        to{opacity:1} }
    @keyframes fadeOut      { from{opacity:1}                        to{opacity:0} }
    @keyframes slideInRight { from{opacity:0;transform:translateX(80px)}  to{opacity:1;transform:translateX(0)} }
    @keyframes slideOutLeft { from{opacity:1;transform:translateX(0)}     to{opacity:0;transform:translateX(-80px)} }
    @keyframes zoomIn       { from{opacity:0;transform:scale(0.85)}  to{opacity:1;transform:scale(1)} }
    @keyframes zoomOut      { from{opacity:1;transform:scale(1)}     to{opacity:0;transform:scale(1.1)} }

    /* ── Backgrounds — 全スライド統一 ── */
    .bg-dark,
    .bg-blue,
    .bg-teal,
    .bg-purple,
    .bg-orange { background: var(--bg); }

    /* ── Typography ── */
    .slide-tag {
      font-size: 11px;
      font-weight: 800;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--telop);
      background: #000;
      padding: 4px 14px;
      border-radius: 20px;
      display: inline-block;
      margin-bottom: 18px;
    }

    .slide-title {
      font-size: clamp(2.2rem,5.5vw,4.5rem);
      font-weight: 800;
      line-height: 1.1;
      text-align: center;
      margin-bottom: 20px;
      background: linear-gradient(140deg,#fff 30%,rgba(255,255,255,0.65));
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
    }

    .slide-body {
      font-size: clamp(0.9rem,1.8vw,1.15rem);
      color: rgba(255,255,255,0.65);
      text-align: center;
      max-width: 680px;
      line-height: 1.75;
    }

    .slide-body strong { color: #fff; }

    .logo {
      font-size: clamp(4rem,11vw,8.5rem);
      font-weight: 900;
      letter-spacing: -3px;
      color: var(--accent);
      line-height: 1;
      margin-bottom: 12px;
    }

    .divider {
      width: 50px;
      height: 3px;
      background: var(--accent);
      border-radius: 2px;
      margin: 18px auto;
    }

    /* ── Cards ── */
    .card-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit,minmax(190px,1fr));
      gap: 16px;
      width: 100%;
      max-width: 880px;
      margin-top: 36px;
    }

    .card {
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.09);
      border-radius: 16px;
      padding: 26px 18px;
      text-align: center;
      backdrop-filter: blur(8px);
    }

    .card-icon  { font-size: 2.2rem; margin-bottom: 10px; }
    .card-title { font-size: 0.95rem; font-weight: 700; margin-bottom: 6px; }
    .card-desc  { font-size: 0.82rem; color: rgba(255,255,255,0.5); line-height: 1.5; }

    /* ── Steps ── */
    .steps {
      display: flex;
      flex-direction: column;
      gap: 16px;
      max-width: 580px;
      width: 100%;
      margin-top: 28px;
    }

    .step {
      display: flex;
      align-items: center;
      gap: 22px;
      background: rgba(255,255,255,0.04);
      border-left: 3px solid var(--accent);
      border-radius: 0 12px 12px 0;
      padding: 16px 22px;
    }

    .step-num  { font-size: 2rem; font-weight: 900; color: var(--accent); min-width: 44px; }
    .step-text strong { display: block; font-size: 1rem; margin-bottom: 3px; }
    .step-text span   { font-size: 0.85rem; color: rgba(255,255,255,0.55); }

    /* ── Stats ── */
    .stats-grid {
      display: grid;
      grid-template-columns: repeat(3,1fr);
      gap: 28px;
      max-width: 780px;
      margin-top: 36px;
    }

    .stat-num   { font-size: clamp(2.2rem,4.5vw,3.8rem); font-weight: 900; color: var(--accent); line-height: 1; }
    .stat-label { font-size: 0.82rem; color: rgba(255,255,255,0.5); margin-top: 7px; }

    /* ── CTA ── */
    .cta-btn {
      display: inline-block;
      margin-top: 38px;
      padding: 17px 52px;
      background: var(--accent);
      color: #fff;
      font-size: 1.05rem;
      font-weight: 800;
      border-radius: 50px;
      text-decoration: none;
      letter-spacing: 0.5px;
      transition: transform 0.15s, box-shadow 0.15s;
    }
    .cta-btn:hover { transform: translateY(-2px); box-shadow: 0 12px 40px rgba(0,82,255,0.4); }

    /* ── Progress bar ── */
    #progress {
      position: fixed;
      top: 0; left: 0;
      height: 2px;
      background: var(--accent);
      transition: width 0.35s ease;
      z-index: 200;
    }

    /* ── Bottom UI ── */
    #ui {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      padding: 18px 40px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: linear-gradient(to top,rgba(0,0,0,0.75) 0%,transparent 100%);
      z-index: 100;
    }

    #dots { display: flex; gap: 7px; align-items: center; }

    .dot {
      width: 7px; height: 7px;
      border-radius: 50%;
      background: rgba(255,255,255,0.2);
      cursor: pointer;
      transition: all 0.3s;
    }

    .dot.active {
      background: var(--accent);
      width: 22px;
      border-radius: 4px;
      box-shadow: 0 0 6px var(--accent);
    }

    #counter {
      font-size: 12px;
      color: rgba(255,255,255,0.35);
      font-variant-numeric: tabular-nums;
      letter-spacing: 1px;
    }

    #autoplay-btn {
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.18);
      color: rgba(255,255,255,0.7);
      padding: 7px 18px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 1.5px;
      transition: all 0.2s;

    /* ── Nav arrows ── */
    .nav-arrow {
      position: fixed;
      top: 50%;
      transform: translateY(-50%);
      background: rgba(255,255,255,0.06);
      border: 1px solid rgba(255,255,255,0.1);
      color: rgba(255,255,255,0.45);

      border-radius: 8px;
      font-size: 1.4rem;
      cursor: pointer;
      z-index: 100;

    .nav-arrow:hover { background: rgba(255,255,255,0.14); color: #fff; border-color: rgba(255,255,255,0.25); }
    #prev { left: 14px; }
    #next { right: 14px; }

    /* ── Keyboard hint ── */
    #hint {
      position: fixed;
      top: 20px; right: 20px;
      font-size: 10px;
      color: rgba(255,255,255,0.18);
      letter-spacing: 1px;
      z-index: 100;
    }

    /* ── Diff table ── */
    .diff-table {
      display: flex;
      flex-direction: column;
      gap: 10px;
      width: 100%;
      max-width: 680px;
      margin-top: 28px;
    }

    .diff-row {
      display: grid;
      grid-template-columns: 28px 180px 1fr;
      align-items: center;
      gap: 16px;
      padding: 14px 20px;
      border-radius: 12px;
      font-size: 0.9rem;
    }

    .diff-no  { background: rgba(255,255,255,0.04); color: rgba(255,255,255,0.45); }
    .diff-yes { background: rgba(0,82,255,0.15); border: 1px solid rgba(0,82,255,0.4); color: #fff; }

    .diff-icon  { font-size: 1rem; font-weight: 900; }
    .diff-no  .diff-icon  { color: rgba(255,255,255,0.25); }
    .diff-yes .diff-icon  { color: var(--accent); }
    .diff-label { font-weight: 700; }
    .diff-value { color: inherit; opacity: 0.85; }

    /* ── AI Image ── */
    .slide-image-wrap {
      position: absolute;
      inset: 0;
      z-index: 0;
      overflow: hidden;
    }

    .slide-image-wrap img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1s ease;
    }

    .slide-image-wrap img.loaded { opacity: 0.18; }

    .slide-image-wrap::after {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, transparent 0%, rgba(0,0,0,0.7) 100%);
    }

    .slide > *:not(.slide-image-wrap) { position: relative; z-index: 1; }

    /* ── Responsive ── */
    @media (max-width: 768px) {
      .slide        { padding: 56px 20px 88px; }
      .nav-arrow    { display: none; }
      #hint         { display: none; }
      .card-grid    { grid-template-columns: 1fr 1fr; gap: 10px; }
      .stats-grid   { gap: 12px; }
      .step         { padding: 12px 16px; gap: 14px; }
      .step-num     { font-size: 1.5rem; min-width: 32px; }
      .diff-row     { grid-template-columns: 22px 1fr; gap: 10px; padding: 11px 14px; }
      .diff-value   { display: none; }
      #ui           { padding: 12px 20px 16px; }
    }

    @media (max-width: 480px) {
      .slide        { padding: 52px 16px 80px; }
      .card-grid    { grid-template-columns: 1fr 1fr; gap: 8px; }
      .card         { padding: 16px 10px; }
      .card-icon    { font-size: 1.6rem; }
      .card-title   { font-size: 0.8rem; }
      .card-desc    { font-size: 0.72rem; }
      .stats-grid   { grid-template-columns: repeat(3,1fr); gap: 8px; }
      .stat-num     { font-size: 1.6rem; }
      .stat-label   { font-size: 0.7rem; }
      .steps        { gap: 10px; }
      .step         { padding: 10px 14px; gap: 12px; }
      .step-num     { font-size: 1.3rem; min-width: 28px; }
      .step-text strong { font-size: 0.88rem; }
      .step-text span   { font-size: 0.76rem; }
      .slide-body   { font-size: 0.88rem; }
      .diff-row     { font-size: 0.82rem; padding: 10px 12px; }
      #autoplay-btn { display: none; }
      #dots         { gap: 5px; }
      .dot          { width: 6px; height: 6px; }
      .dot.active   { width: 18px; }
    }
  </style>

      <div class="stat-label">${s.label}</div>
    </div>`).join('')}
  </div>` : '';

  const cards = c.cards ? `<div class="card-grid">
    ${c.cards.map(cd=>`<div class="card">
      <div class="card-icon">${cd.icon}</div>
      <div class="card-title">${cd.title}</div>
      <div class="card-desc">${cd.desc}</div>
    </div>`).join('')}
  </div>` : '';

  const steps = c.steps ? `<div class="steps">
    ${c.steps.map(s=>`<div class="step">
      <div class="step-num">${s.num}</div>
      <div class="step-text"><strong>${s.title}</strong><span>${s.desc}</span></div>
    </div>`).join('')}
  </div>` : '';

  if (type === 'cover')   html = `${tag}<div class="logo">${c.logo}</div>${div}${title}${body}`;
  if (type === 'problem') html = `${tag}${title}${body}${stats}`;
  if (type === 'solution')html = `${tag}${title}${div}${body}`;
  if (type === 'steps')   html = `${tag}${title}${steps}`;
  if (type === 'pricing') html = `${tag}${title}${stats}<div class="slide-body" style="margin-top:28px">${c.body}</div>`;
  if (type === 'cta')     html = `${tag}${title}${body}<a class="cta-btn" href="${c.url}" target="_blank">${c.cta}</a>`;
  if (['features','coverage','trust','model'].includes(type)) html = `${tag}${title}${body}${cards}`;
  if (type === 'concept' || type === 'transit') html = `${tag}${title}${div}${body}`;
  if (type === 'diff') {
    const rows = c.rows.map(r => `
      <div class="diff-row ${r.ok ? 'diff-yes' : 'diff-no'}">
        <span class="diff-icon">${r.ok ? '✓' : '✗'}</span>
        <span class="diff-label">${r.label}</span>
        <span class="diff-value">${r.value}</span>
      </div>
    `).join('');
    html = `${tag}${title}<div class="diff-table">${rows}</div>`;
  }

  // AI background image
  if (c.image) {
    const imgUrl = IMAGE_API.generate(c.image, 1200, 700);
    const wrap = document.createElement('div');
    wrap.className = 'slide-image-wrap';
    wrap.innerHTML = `<img src="${imgUrl}" alt="" loading="lazy">`;
    wrap.querySelector('img').onload = function() { this.classList.add('loaded'); };
    el.innerHTML = html;
    el.insertBefore(wrap, el.firstChild);
  } else {
    el.innerHTML = html;
  }
  return el;
}

// ── Navigation ──
function goTo(idx) {
  if (animLock || idx === current || idx < 0 || idx >= slides.length) return;
  animLock = true;

  const old = stage.querySelector('.slide.active');
  const neo = renderSlide(slides[idx]);
  stage.appendChild(neo);

  old?.classList.add('leaving');
  neo.classList.add('active', 'entering');

  setTimeout(() => {
    old?.remove();
    neo.classList.remove('entering');
    current = idx;
    updateUI();
    animLock = false;
  }, 620);
}

function next() { current < slides.length - 1 ? goTo(current + 1) : stopAuto(); }
function prev() { goTo(current - 1); }

// ── Auto-play ──
function startAuto() {
  if (autoTimer) return;
  autoTimer = setInterval(next, 4200);
  autoBtn.textContent = '⏸ AUTO';
  autoBtn.classList.add('playing');
}

function stopAuto() {
  clearInterval(autoTimer);
  autoTimer = null;
  autoBtn.textContent = '▶ AUTO';
  autoBtn.classList.remove('playing');
}

// ── UI update ──
function buildDots() {
  dotsEl.innerHTML = '';
  slides.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'dot' + (i === current ? ' active' : '');
    d.onclick = () => goTo(i);
    dotsEl.appendChild(d);
  });
}

function updateUI() {
  progressEl.style.width = ((current + 1) / slides.length * 100) + '%';
  counterEl.textContent  = `${current + 1} / ${slides.length}`;
  document.querySelectorAll('.dot').forEach((d, i) => {
    d.className = 'dot' + (i === current ? ' active' : '');
  });
}

// ── Init ──
const first = renderSlide(slides[0]);
first.classList.add('active');
stage.appendChild(first);
buildDots();
updateUI();

// ── Events ──
document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); next(); }
  if (e.key === 'ArrowLeft')  prev();
  if (e.key === 'Escape')     stopAuto();
  if (e.key.toLowerCase() === 'a') autoTimer ? stopAuto() : startAuto();
});

document.getElementById('next').onclick = next;
document.getElementById('prev').onclick = prev;
autoBtn.onclick = () => autoTimer ? stopAuto() : startAuto();

// Touch swipe（縦スクロールと競合しないよう横方向のみ検知）
let tx = 0, ty = 0;
document.addEventListener('touchstart', e => {
  tx = e.touches[0].clientX;
  ty = e.touches[0].clientY;
}, { passive: true });
document.addEventListener('touchend', e => {
  const dx = e.changedTouches[0].clientX - tx;
  const dy = e.changedTouches[0].clientY - ty;
  if (Math.abs(dx) > Math.abs(dy) && Math.abs(dx) > 45) {
    dx < 0 ? next() : prev();
  }
});
</script>
</body>
